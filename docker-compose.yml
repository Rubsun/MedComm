services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: medcomm
      POSTGRES_PASSWORD: medcomm
      POSTGRES_DB: medcomm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcomm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://medcomm:medcomm@db:5432/medcomm
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-random-secret-at-least-32-chars}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      MEDIA_DIR: media
      COOKIE_SECURE: "false"
      CORS_ORIGINS: '["http://localhost"]'
    volumes:
      - media_data:/app/media
      - ./content:/app_root/content:ro
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build: ./app
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  postgres_data:
  media_data:
